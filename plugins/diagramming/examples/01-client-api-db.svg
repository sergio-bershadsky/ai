<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280">
<defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0 L0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/></pattern><marker id="ah-cyan" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,5 L0,10" fill="none" stroke="#22d3ee" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="ah-violet" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,5 L0,10" fill="none" stroke="#a78bfa" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="ah-slate" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,5 L0,10" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<style>text{paint-order:stroke fill;stroke:#020617;stroke-width:4;stroke-linejoin:round;stroke-linecap:round;fill:#e2e8f0;font-size:12px;font-family:'JetBrains Mono',ui-monospace,monospace;}text.title{stroke-width:6;font-size:16px;font-weight:700;fill:#f1f5f9;}text.sub{stroke-width:3;font-size:10px;fill:#94a3b8;}text.lbl{font-size:11px;fill:#cbd5e1;}rect.component{transition:filter 220ms ease;cursor:pointer;}rect.component:hover{filter:drop-shadow(0 0 8px var(--glow,rgba(255,255,255,0.2)));}rect.cyan{--glow:rgba(34,211,238,0.5);}rect.emerald{--glow:rgba(52,211,153,0.5);}rect.violet{--glow:rgba(167,139,250,0.5);}rect.slate{--glow:rgba(148,163,184,0.4);}</style>
<rect width="960" height="280" fill="#020617"/>
<rect width="960" height="280" fill="url(#grid)"/>
<text class="title" x="32" y="44">THREE-TIER REQUEST FLOW</text>
<text class="sub" x="32" y="64">user · edge · service · storage — blueprint v2 (h = content_h + 24)</text>
<rect class="component slate" x="80" y="180" width="140" height="52" rx="2" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1"/>
<text x="150" y="202" text-anchor="middle">USER</text>
<text class="sub" x="150" y="218" text-anchor="middle">browser</text>
<rect class="component cyan" x="300" y="180" width="140" height="52" rx="2" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
<text x="370" y="202" text-anchor="middle">API GATEWAY</text>
<text class="sub" x="370" y="218" text-anchor="middle">edge · TLS</text>
<rect class="component emerald" x="520" y="180" width="140" height="52" rx="2" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
<text x="590" y="202" text-anchor="middle">ORDER SVC</text>
<text class="sub" x="590" y="218" text-anchor="middle">compute</text>
<rect class="component violet" x="740" y="180" width="140" height="52" rx="2" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
<text x="810" y="202" text-anchor="middle">POSTGRES</text>
<text class="sub" x="810" y="218" text-anchor="middle">primary</text>
<path d="M220,206 H300" fill="none" stroke="#94a3b8" stroke-width="1.0" stroke-linecap="round" marker-end="url(#ah-slate)"/>
<text class="lbl" x="260" y="200" text-anchor="middle">HTTPS</text>
<path d="M440,206 H520" fill="none" stroke="#22d3ee" stroke-width="1.0" stroke-linecap="round" marker-end="url(#ah-cyan)"/>
<text class="lbl" x="480" y="200" text-anchor="middle">gRPC</text>
<path d="M660,206 H740" fill="none" stroke="#a78bfa" stroke-width="1.0" stroke-dasharray="4,3" stroke-linecap="round" marker-end="url(#ah-violet)"/>
<text class="lbl" x="700" y="200" text-anchor="middle">SQL</text>
</svg>
