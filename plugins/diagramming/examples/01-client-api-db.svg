<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="JetBrains Mono, ui-monospace, monospace">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <style>
    text { paint-order: stroke fill; stroke: rgba(2, 6, 23, 0.75); stroke-width: 1; stroke-linejoin: round; stroke-linecap: round; fill: #e2e8f0; font-size: 12px; }
    .title { font-size: 16px; font-weight: 700; fill: #f1f5f9; }
    .lbl { font-size: 11px; fill: #cbd5e1; }
    .sub { font-size: 10px; fill: #94a3b8; stroke-width: 2; }
  </style>
  <rect width="900" height="320" fill="#020617"/>
  <rect width="900" height="320" fill="url(#grid)"/>

  <rect x="34.0" y="23.4" width="232.8" height="22.8" rx="3" fill="rgba(15,23,42,0.92)" stroke="rgba(148, 163, 184, 0.75)" stroke-width="1"/><text x="40" y="40" class="title">Three-tier request flow</text>
  <text x="40" y="60" class="sub">straight edges, semantic palette, halo labels — the simplest diagram the skill produces</text>

  <!-- External user -->
  <rect x="40"  y="170" width="140" height="70" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="110" y="200" text-anchor="middle">USER</text>
  <text x="110" y="220" class="sub" text-anchor="middle">browser</text>

  <!-- API Gateway -->
  <rect x="260" y="170" width="140" height="70" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="330" y="200" text-anchor="middle">API GATEWAY</text>
  <text x="330" y="220" class="sub" text-anchor="middle">edge / TLS</text>

  <!-- Service -->
  <rect x="480" y="170" width="140" height="70" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="550" y="200" text-anchor="middle">ORDER SVC</text>
  <text x="550" y="220" class="sub" text-anchor="middle">compute</text>

  <!-- Database -->
  <rect x="700" y="170" width="140" height="70" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="770" y="200" text-anchor="middle">POSTGRES</text>
  <text x="770" y="220" class="sub" text-anchor="middle">primary</text>

  <!-- Edges -->
  <line x1="180" y1="205" x2="258" y2="205" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ah)"/>
  <rect x="196.5" y="182.7" width="45.0" height="17.6" rx="3" fill="rgba(15,23,42,0.92)" stroke="rgba(148, 163, 184, 0.75)" stroke-width="1"/><text x="219" y="195" class="lbl" text-anchor="middle">HTTPS</text>

  <line x1="400" y1="205" x2="478" y2="205" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#ah)"/>
  <rect x="419.8" y="182.7" width="38.4" height="17.6" rx="3" fill="rgba(15,23,42,0.92)" stroke="rgba(148, 163, 184, 0.75)" stroke-width="1"/><text x="439" y="195" class="lbl" text-anchor="middle">gRPC</text>

  <line x1="620" y1="205" x2="698" y2="205" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#ah)"/>
  <rect x="643.1" y="182.7" width="31.8" height="17.6" rx="3" fill="rgba(15,23,42,0.92)" stroke="rgba(148, 163, 184, 0.75)" stroke-width="1"/><text x="659" y="195" class="lbl" text-anchor="middle">SQL</text>
</svg>
