<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700">
<defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0 L0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/></pattern><marker id="ah-cyan" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,5 L0,10" fill="none" stroke="#22d3ee" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="ah-emerald" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,5 L0,10" fill="none" stroke="#34d399" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="ah-violet" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,5 L0,10" fill="none" stroke="#a78bfa" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="ah-rose" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,5 L0,10" fill="none" stroke="#fb7185" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="ah-amber" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,5 L0,10" fill="none" stroke="#fbbf24" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="ah-slate" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,5 L0,10" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<style>text{paint-order:stroke fill;stroke:#020617;stroke-width:4;stroke-linejoin:round;stroke-linecap:round;fill:#e2e8f0;font-size:12px;font-family:'JetBrains Mono',ui-monospace,monospace;}text.title{stroke-width:6;font-size:16px;font-weight:700;fill:#f1f5f9;}text.sub{stroke-width:3;font-size:10px;fill:#94a3b8;}text.lbl{font-size:11px;fill:#cbd5e1;}text.cluster{stroke-width:5;font-size:11px;font-weight:600;fill:#cbd5e1;}rect.component{transition:filter 220ms ease;cursor:pointer;}rect.component:hover{filter:drop-shadow(0 0 8px var(--glow,rgba(255,255,255,0.2)));}rect.cyan{--glow:rgba(34,211,238,0.5);}rect.emerald{--glow:rgba(52,211,153,0.5);}rect.violet{--glow:rgba(167,139,250,0.5);}rect.rose{--glow:rgba(251,113,133,0.5);}rect.amber{--glow:rgba(251,191,36,0.5);}rect.slate{--glow:rgba(148,163,184,0.4);}</style>
<rect width="960" height="700" fill="#020617"/>
<rect width="960" height="700" fill="url(#grid)"/>
<text class="title" x="32" y="44">CLASSIC 3-TIER WEB APPLICATION (10 elements)</text>
<text class="sub" x="32" y="64">edge · web · app · data — crash-test baseline at small scale</text>
<rect x="270" y="130" width="420" height="92" rx="4" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="8,4"/>
<text class="cluster" x="286" y="136">EDGE</text>
<rect x="270" y="252" width="420" height="92" rx="4" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="8,4"/>
<text class="cluster" x="286" y="258">WEB TIER</text>
<rect x="150" y="374" width="660" height="92" rx="4" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="8,4"/>
<text class="cluster" x="166" y="380">APP TIER</text>
<rect x="270" y="496" width="420" height="92" rx="4" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="8,4"/>
<text class="cluster" x="286" y="502">DATA TIER</text>
<rect class="component slate" x="410" y="64" width="140" height="36" rx="2" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1"/>
<text x="480" y="86" text-anchor="middle">USER</text>
<rect class="component amber" x="320" y="160" width="140" height="52" rx="2" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
<text x="390" y="182" text-anchor="middle">CDN</text>
<text class="sub" x="390" y="198" text-anchor="middle">static assets</text>
<rect class="component amber" x="500" y="160" width="140" height="52" rx="2" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
<text x="570" y="182" text-anchor="middle">LB</text>
<text class="sub" x="570" y="198" text-anchor="middle">HAProxy</text>
<rect class="component cyan" x="320" y="282" width="140" height="52" rx="2" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
<text x="390" y="304" text-anchor="middle">WEB-1</text>
<text class="sub" x="390" y="320" text-anchor="middle">nginx</text>
<rect class="component cyan" x="500" y="282" width="140" height="52" rx="2" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
<text x="570" y="304" text-anchor="middle">WEB-2</text>
<text class="sub" x="570" y="320" text-anchor="middle">nginx</text>
<rect class="component emerald" x="180" y="404" width="140" height="52" rx="2" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
<text x="250" y="426" text-anchor="middle">APP-1</text>
<text class="sub" x="250" y="442" text-anchor="middle">node.js</text>
<rect class="component emerald" x="410" y="404" width="140" height="52" rx="2" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
<text x="480" y="426" text-anchor="middle">APP-2</text>
<text class="sub" x="480" y="442" text-anchor="middle">node.js</text>
<rect class="component rose" x="640" y="404" width="140" height="52" rx="2" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1"/>
<text x="710" y="426" text-anchor="middle">REDIS</text>
<text class="sub" x="710" y="442" text-anchor="middle">cache</text>
<rect class="component violet" x="320" y="526" width="140" height="52" rx="2" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
<text x="390" y="548" text-anchor="middle">PG PRIMARY</text>
<text class="sub" x="390" y="564" text-anchor="middle">postgres</text>
<rect class="component violet" x="500" y="526" width="140" height="52" rx="2" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
<text x="570" y="548" text-anchor="middle">PG REPLICA</text>
<text class="sub" x="570" y="564" text-anchor="middle">read-only</text>
<!-- USER bottom (2 outbound: CDN, LB). Slots: 457, 503. via_y=130. -->
<path d="M457,100 V118 Q457,130 445,130 H402 Q390,130 390,142 V160" fill="none" stroke="#94a3b8" stroke-width="1.0" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#ah-amber)"/>
<path d="M503,100 V118 Q503,130 515,130 H558 Q570,130 570,142 V160" fill="none" stroke="#94a3b8" stroke-width="1.0" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#ah-amber)"/>
<!-- LB bottom (2 outbound: WEB-1, WEB-2). Slots: 547, 593. via_y=247. -->
<path d="M547,212 V235 Q547,247 535,247 H402 Q390,247 390,259 V282" fill="none" stroke="#22d3ee" stroke-width="1.0" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#ah-cyan)"/>
<path d="M593,212 V282" fill="none" stroke="#22d3ee" stroke-width="1.0" stroke-linecap="round" marker-end="url(#ah-cyan)"/>
<!-- WEB-1 → APP-1, WEB-2 → APP-2 (b→t, single outbound each). via_y=369. -->
<path d="M390,334 V357 Q390,369 378,369 H262 Q250,369 250,381 V404" fill="none" stroke="#34d399" stroke-width="1.0" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#ah-emerald)"/>
<path d="M570,334 V357 Q570,369 558,369 H492 Q480,369 480,381 V404" fill="none" stroke="#34d399" stroke-width="1.0" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#ah-emerald)"/>
<!-- APP-2 → REDIS (same row, H direct). Only one cache edge to avoid crossing boxes. -->
<path d="M550,430 H640" fill="none" stroke="#fb7185" stroke-width="1.0" stroke-dasharray="3,3" stroke-linecap="round" marker-end="url(#ah-rose)"/>
<text class="lbl" x="595" y="424" text-anchor="middle">cache</text>
<!-- APP-1 → PG PRIMARY, APP-2 → PG PRIMARY (b→t). PG PRIMARY has 2 incoming on top; slots at 367 and 413. -->
<path d="M250,456 V479 Q250,491 262,491 H355 Q367,491 367,503 V526" fill="none" stroke="#a78bfa" stroke-width="1.0" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#ah-violet)"/>
<path d="M480,456 V479 Q480,491 468,491 H425 Q413,491 413,503 V526" fill="none" stroke="#a78bfa" stroke-width="1.0" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#ah-violet)"/>
<!-- PG PRIMARY → PG REPLICA (same row, H direct). -->
<path d="M460,552 H500" fill="none" stroke="#a78bfa" stroke-width="1.0" stroke-linecap="round" marker-end="url(#ah-violet)"/>
<text class="lbl" x="480" y="546" text-anchor="middle">replicate</text>
</svg>
