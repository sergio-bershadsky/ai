<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
<defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0 L0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/></pattern><marker id="ah-cyan" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,5 L0,10" fill="none" stroke="#22d3ee" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="ah-emerald" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,5 L0,10" fill="none" stroke="#34d399" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="ah-violet" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,5 L0,10" fill="none" stroke="#a78bfa" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="ah-rose" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,5 L0,10" fill="none" stroke="#fb7185" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<style>text{paint-order:stroke fill;stroke:#020617;stroke-width:4;stroke-linejoin:round;stroke-linecap:round;fill:#e2e8f0;font-size:12px;font-family:'JetBrains Mono',ui-monospace,monospace;}text.title{stroke-width:6;font-size:16px;font-weight:700;fill:#f1f5f9;}text.sub{stroke-width:3;font-size:10px;fill:#94a3b8;}text.lbl{font-size:11px;fill:#cbd5e1;}text.cluster{stroke-width:5;font-size:11px;font-weight:600;fill:#cbd5e1;}rect.component{transition:filter 220ms ease;cursor:pointer;}rect.component:hover{filter:drop-shadow(0 0 8px var(--glow,rgba(255,255,255,0.2)));}rect.cyan{--glow:rgba(34,211,238,0.5);}rect.emerald{--glow:rgba(52,211,153,0.5);}rect.violet{--glow:rgba(167,139,250,0.5);}rect.rose{--glow:rgba(251,113,133,0.5);}</style>
<rect width="960" height="540" fill="#020617"/>
<rect width="960" height="540" fill="url(#grid)"/>
<text class="title" x="32" y="44">MULTI-TENANT CREDENTIALS — KMS-WRAPPED AT REST</text>
<text class="sub" x="32" y="64">bold rose = key material · emerald = decrypted only in agent memory</text>
<rect x="40" y="130" width="880" height="120" rx="4" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="8,4"/>
<text class="cluster" x="56" y="136">CONTROL PLANE — encrypted at rest</text>
<rect x="40" y="380" width="880" height="120" rx="4" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="8,4"/>
<text class="cluster" x="56" y="386">DATA PLANE — plaintext only in agent memory</text>
<rect class="component violet" x="80" y="170" width="200" height="52" rx="2" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
<text x="180" y="192" text-anchor="middle">TENANT CONFIG DB</text>
<text class="sub" x="180" y="208" text-anchor="middle">creds: KMS-wrapped</text>
<rect class="component rose" x="380" y="170" width="200" height="52" rx="2" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1"/>
<text x="480" y="192" text-anchor="middle">AWS / GCP KMS</text>
<text class="sub" x="480" y="208" text-anchor="middle">CMK · HSM-backed</text>
<rect class="component emerald" x="680" y="170" width="200" height="52" rx="2" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
<text x="780" y="192" text-anchor="middle">ADMIN API</text>
<text class="sub" x="780" y="208" text-anchor="middle">tenant onboarding</text>
<rect class="component emerald" x="300" y="420" width="200" height="52" rx="2" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
<text x="400" y="442" text-anchor="middle">XDS AGENT</text>
<text class="sub" x="400" y="458" text-anchor="middle">holds plaintext DEK</text>
<rect class="component cyan" x="620" y="420" width="200" height="52" rx="2" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
<text x="720" y="442" text-anchor="middle">ENVOY</text>
<text class="sub" x="720" y="458" text-anchor="middle">per-tenant clusters</text>
<!-- ADMIN → TENANT_DB (write wrapped DEK), routed above row at via_y=150 -->
<path d="M780,170 V162 Q780,150 768,150 H192 Q180,150 180,162 V170" fill="none" stroke="#a78bfa" stroke-width="1.0" stroke-dasharray="4,3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#ah-violet)"/>
<text class="lbl" x="480" y="144" text-anchor="middle">write wrapped DEK</text>
<!-- ADMIN → KMS (Encrypt) -->
<path d="M680,196 H580" fill="none" stroke="#fb7185" stroke-width="2" stroke-linecap="round" marker-end="url(#ah-rose)"/>
<text class="lbl" x="630" y="190" text-anchor="middle">Encrypt(DEK)</text>
<!-- XDS top → 2 outbound, distributed at slots (367, 433) on y=420. via_y=315 (mid inter-zone gap). -->
<path d="M367,420 V327 Q367,315 355,315 H192 Q180,315 180,303 V222" fill="none" stroke="#a78bfa" stroke-width="1.0" stroke-dasharray="4,3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#ah-violet)"/>
<text class="lbl" x="320" y="370">fetch wrapped</text>
<path d="M433,420 V327 Q433,315 445,315 H468 Q480,315 480,303 V222" fill="none" stroke="#fb7185" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#ah-rose)"/>
<text class="lbl" x="480" y="370">Decrypt(wrapped)</text>
<!-- XDS → ENVOY (xDS push) -->
<path d="M500,446 H620" fill="none" stroke="#34d399" stroke-width="1.0" stroke-linecap="round" marker-end="url(#ah-emerald)"/>
<text class="lbl" x="560" y="440" text-anchor="middle">xDS push</text>
</svg>
