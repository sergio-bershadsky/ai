<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340">
<defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0 L0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/></pattern><marker id="ah-slate" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,5 L0,10" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<style>text{paint-order:stroke fill;stroke:#020617;stroke-width:4;stroke-linejoin:round;stroke-linecap:round;fill:#e2e8f0;font-size:12px;font-family:'JetBrains Mono',ui-monospace,monospace;}text.title{stroke-width:6;font-size:16px;font-weight:700;fill:#f1f5f9;}text.sub{stroke-width:3;font-size:10px;fill:#94a3b8;}text.lbl{font-size:11px;fill:#cbd5e1;}rect.component{transition:filter 220ms ease;cursor:pointer;}rect.component:hover{filter:drop-shadow(0 0 8px var(--glow,rgba(255,255,255,0.2)));}rect.cyan{--glow:rgba(34,211,238,0.5);}rect.emerald{--glow:rgba(52,211,153,0.5);}rect.violet{--glow:rgba(167,139,250,0.5);}rect.rose{--glow:rgba(251,113,133,0.5);}rect.amber{--glow:rgba(251,191,36,0.5);}</style>
<rect width="960" height="340" fill="#020617"/>
<rect width="960" height="340" fill="url(#grid)"/>
<text class="title" x="32" y="44">CORNER-DISC ICON ANNOTATIONS</text>
<text class="sub" x="32" y="64">opt-in glyphs · disc fill = box stroke · glyph stroke = canvas colour · canonical r=12 disc fits in standard 12 px padding</text>
<!-- 5 boxes at y=200, h=52 (2-line content). Standard padding = disc radius → no extra adjustments needed. -->
<rect class="component cyan" x="70" y="200" width="140" height="52" rx="2" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
<circle cx="90" cy="200" r="12" fill="#22d3ee"/>
<g transform="translate(90,200)" stroke="#020617" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none">
  <rect x="-6" y="-4" width="12" height="8" rx="1"/>
  <line x1="-3" y1="6" x2="3" y2="6"/>
  <line x1="0" y1="4" x2="0" y2="6"/>
</g>
<text x="140" y="222" text-anchor="middle">CLIENT</text>
<text class="sub" x="140" y="238" text-anchor="middle">browser</text>
<rect class="component emerald" x="240" y="200" width="140" height="52" rx="2" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
<circle cx="260" cy="200" r="12" fill="#34d399"/>
<g transform="translate(260,200)" stroke="#020617" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none">
  <rect x="-6" y="-5" width="12" height="4.5" rx="1"/>
  <rect x="-6" y="0.5" width="12" height="4.5" rx="1"/>
  <line x1="-4" y1="-2.75" x2="-3" y2="-2.75"/>
  <line x1="-4" y1="2.75" x2="-3" y2="2.75"/>
</g>
<text x="310" y="222" text-anchor="middle">API</text>
<text class="sub" x="310" y="238" text-anchor="middle">resource svr</text>
<rect class="component violet" x="410" y="200" width="140" height="52" rx="2" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
<circle cx="430" cy="200" r="12" fill="#a78bfa"/>
<g transform="translate(430,200)" stroke="#020617" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none">
  <ellipse cx="0" cy="-4" rx="6" ry="2"/>
  <line x1="-6" y1="-4" x2="-6" y2="4"/>
  <line x1="6" y1="-4" x2="6" y2="4"/>
  <ellipse cx="0" cy="0" rx="6" ry="2"/>
  <path d="M -6 4 a 6 2 0 0 0 12 0"/>
</g>
<text x="480" y="222" text-anchor="middle">POSTGRES</text>
<text class="sub" x="480" y="238" text-anchor="middle">primary</text>
<rect class="component rose" x="580" y="200" width="140" height="52" rx="2" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1"/>
<circle cx="600" cy="200" r="12" fill="#fb7185"/>
<g transform="translate(600,200)" stroke="#020617" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none">
  <circle cx="-2" cy="0" r="3"/>
  <line x1="1" y1="0" x2="6" y2="0"/>
  <line x1="4" y1="0" x2="4" y2="2.5"/>
  <line x1="6" y1="0" x2="6" y2="3.5"/>
</g>
<text x="650" y="222" text-anchor="middle">KMS</text>
<text class="sub" x="650" y="238" text-anchor="middle">HSM-backed</text>
<rect class="component amber" x="750" y="200" width="140" height="52" rx="2" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
<circle cx="770" cy="200" r="12" fill="#fbbf24"/>
<g transform="translate(770,200)" stroke="#020617" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none">
  <rect x="-6" y="-4" width="12" height="8" rx="1"/>
  <path d="M -6 -4 L 0 1 L 6 -4"/>
</g>
<text x="820" y="222" text-anchor="middle">KAFKA</text>
<text class="sub" x="820" y="238" text-anchor="middle">events</text>
<path d="M210,226 H240" fill="none" stroke="#94a3b8" stroke-width="1.0" stroke-linecap="round" marker-end="url(#ah-slate)"/>
<path d="M380,226 H410" fill="none" stroke="#94a3b8" stroke-width="1.0" stroke-linecap="round" marker-end="url(#ah-slate)"/>
<path d="M550,226 H580" fill="none" stroke="#94a3b8" stroke-width="1.0" stroke-linecap="round" marker-end="url(#ah-slate)"/>
<path d="M720,226 H750" fill="none" stroke="#94a3b8" stroke-width="1.0" stroke-linecap="round" marker-end="url(#ah-slate)"/>
<text class="sub" x="480" y="300" text-anchor="middle">block sizing: h = content_h + 2 * padding (12) = 28 + 24 = 52. disc fits naturally inside standard top padding.</text>
</svg>
