<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="JetBrains Mono, ui-monospace, monospace">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <style>
    text { paint-order: stroke fill; stroke: rgba(2, 6, 23, 0.75); stroke-width: 1; stroke-linejoin: round; stroke-linecap: round; fill: #e2e8f0; font-size: 12px; }
    .title { font-size: 16px; font-weight: 700; fill: #f1f5f9; }
    .lbl { font-size: 11px; fill: #cbd5e1; }
    .lbl-auth { font-size: 11px; fill: #fda4af; }
    .sub { font-size: 10px; fill: #94a3b8; stroke-width: 2; }
    .cluster { font-size: 11px; fill: #fda4af; }
  </style>
  <rect width="900" height="480" fill="#020617"/>
  <rect width="900" height="480" fill="url(#grid)"/>

  <rect x="34.0" y="23.4" width="396.0" height="22.8" rx="3" fill="rgba(15,23,42,0.92)" stroke="rgba(148, 163, 184, 0.75)" stroke-width="1"/><text x="40" y="40" class="title">OAuth2 / JWT flow with security boundary</text>
  <text x="40" y="60" class="sub">rose dashed = auth/token material; rose-bordered cluster = security trust zone</text>

  <!-- Client -->
  <rect x="40" y="200" width="140" height="70" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="110" y="230" text-anchor="middle">SPA CLIENT</text>
  <text x="110" y="250" class="sub" text-anchor="middle">browser</text>

  <!-- Security trust zone -->
  <rect x="260" y="120" width="600" height="280" rx="8" fill="transparent" stroke="#fb7185" stroke-width="1" stroke-dasharray="4,4"/>
  <rect x="274.0" y="129.7" width="170.4" height="17.6" rx="3" fill="rgba(15,23,42,0.92)" stroke="rgba(148, 163, 184, 0.75)" stroke-width="1"/><text x="280" y="142" class="cluster">TRUST ZONE — server-side</text>

  <!-- API -->
  <rect x="300" y="200" width="140" height="70" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="370" y="230" text-anchor="middle">API</text>
  <text x="370" y="250" class="sub" text-anchor="middle">resource server</text>

  <!-- AuthZ Service -->
  <rect x="520" y="200" width="140" height="70" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="590" y="230" text-anchor="middle">AUTHZ</text>
  <text x="590" y="250" class="sub" text-anchor="middle">policy decision</text>

  <!-- IdP -->
  <rect x="700" y="200" width="140" height="70" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="770" y="230" text-anchor="middle">IDP</text>
  <text x="770" y="250" class="sub" text-anchor="middle">Keycloak / Auth0</text>

  <!-- Edges -->
  <!-- Client -> API: bearer token -->
  <line x1="180" y1="235" x2="298" y2="235" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#ah)"/>
  <rect x="200.0" y="212.7" width="78.0" height="17.6" rx="3" fill="rgba(15,23,42,0.92)" stroke="rgba(148, 163, 184, 0.75)" stroke-width="1"/><text x="239" y="225" class="lbl-auth" text-anchor="middle">Bearer JWT</text>

  <!-- API -> AuthZ: introspect -->
  <line x1="440" y1="235" x2="518" y2="235" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#ah)"/>
  <rect x="440.0" y="212.7" width="78.0" height="17.6" rx="3" fill="rgba(15,23,42,0.92)" stroke="rgba(148, 163, 184, 0.75)" stroke-width="1"/><text x="479" y="225" class="lbl-auth" text-anchor="middle">introspect</text>

  <!-- AuthZ -> IdP: fetch JWKS -->
  <line x1="660" y1="225" x2="698" y2="225" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#ah)"/>
  <rect x="659.8" y="202.7" width="38.4" height="17.6" rx="3" fill="rgba(15,23,42,0.92)" stroke="rgba(148, 163, 184, 0.75)" stroke-width="1"/><text x="679" y="215" class="lbl-auth" text-anchor="middle">JWKS</text>

  <!-- IdP -> AuthZ: public key -->
  <line x1="700" y1="248" x2="662" y2="248" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#ah)"/>
  <rect x="649.9" y="257.6" width="58.2" height="17.6" rx="3" fill="rgba(15,23,42,0.92)" stroke="rgba(148, 163, 184, 0.75)" stroke-width="1"/><text x="679" y="270" class="lbl-auth" text-anchor="middle">pub key</text>

  <!-- Client login redirect -->
  <path d="M 110 200 Q 110 100 770 100 Q 770 100 770 198" fill="none" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#ah)"/>
  <rect x="358.1" y="79.7" width="163.8" height="17.6" rx="3" fill="rgba(15,23,42,0.92)" stroke="rgba(148, 163, 184, 0.75)" stroke-width="1"/><text x="440" y="92" class="lbl-auth" text-anchor="middle">OAuth2 redirect (login)</text>

  <!-- API -> client response -->
  <path d="M 300 250 Q 240 320 180 270" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#ah)"/>
  <rect x="207.6" y="307.6" width="64.8" height="17.6" rx="3" fill="rgba(15,23,42,0.92)" stroke="rgba(148, 163, 184, 0.75)" stroke-width="1"/><text x="240" y="320" class="lbl" text-anchor="middle">resource</text>
</svg>
