<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400">
<defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0 L0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/></pattern><marker id="ah-emerald" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,5 L0,10" fill="none" stroke="#34d399" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="ah-rose" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,5 L0,10" fill="none" stroke="#fb7185" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="ah-slate" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,5 L0,10" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<style>text{paint-order:stroke fill;stroke:#020617;stroke-width:4;stroke-linejoin:round;stroke-linecap:round;fill:#e2e8f0;font-size:12px;font-family:'JetBrains Mono',ui-monospace,monospace;}text.title{stroke-width:6;font-size:16px;font-weight:700;fill:#f1f5f9;}text.sub{stroke-width:3;font-size:10px;fill:#94a3b8;}text.lbl{font-size:11px;fill:#cbd5e1;}text.cluster{stroke-width:5;font-size:11px;font-weight:600;fill:#cbd5e1;}rect.component{transition:filter 220ms ease;cursor:pointer;}rect.component:hover{filter:drop-shadow(0 0 8px var(--glow,rgba(255,255,255,0.2)));}rect.emerald{--glow:rgba(52,211,153,0.5);}rect.rose{--glow:rgba(251,113,133,0.5);}rect.slate{--glow:rgba(148,163,184,0.4);}</style>
<rect width="960" height="400" fill="#020617"/>
<rect width="960" height="400" fill="url(#grid)"/>
<text class="title" x="32" y="44">OAUTH2 / JWT FLOW WITH SECURITY BOUNDARY</text>
<text class="sub" x="32" y="64">rose dashed = auth / token material · rose cluster = trust zone</text>
<rect x="260" y="140" width="660" height="140" rx="4" fill="none" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="8,4"/>
<text class="cluster" x="276" y="146">TRUST ZONE — server-side</text>
<rect class="component slate" x="60" y="190" width="140" height="52" rx="2" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1"/>
<text x="130" y="212" text-anchor="middle">SPA CLIENT</text>
<text class="sub" x="130" y="228" text-anchor="middle">browser</text>
<rect class="component emerald" x="290" y="190" width="140" height="52" rx="2" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
<text x="360" y="212" text-anchor="middle">API</text>
<text class="sub" x="360" y="228" text-anchor="middle">resource svr</text>
<rect class="component rose" x="520" y="190" width="140" height="52" rx="2" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1"/>
<text x="590" y="212" text-anchor="middle">AUTHZ</text>
<text class="sub" x="590" y="228" text-anchor="middle">policy decision</text>
<rect class="component rose" x="750" y="190" width="140" height="52" rx="2" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1"/>
<text x="820" y="212" text-anchor="middle">IDP</text>
<text class="sub" x="820" y="228" text-anchor="middle">Keycloak / Auth0</text>
<path d="M200,216 H290" fill="none" stroke="#fb7185" stroke-width="1.0" stroke-dasharray="3,3" stroke-linecap="round" marker-end="url(#ah-rose)"/>
<text class="lbl" x="245" y="210" text-anchor="middle">Bearer JWT</text>
<path d="M430,216 H520" fill="none" stroke="#fb7185" stroke-width="1.0" stroke-dasharray="3,3" stroke-linecap="round" marker-end="url(#ah-rose)"/>
<text class="lbl" x="475" y="210" text-anchor="middle">introspect</text>
<path d="M660,216 H750" fill="none" stroke="#fb7185" stroke-width="1.0" stroke-dasharray="3,3" stroke-linecap="round" marker-end="url(#ah-rose)"/>
<text class="lbl" x="705" y="210" text-anchor="middle">JWKS</text>
</svg>
